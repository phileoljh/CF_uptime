# =============================================================
# HihiMonitor — wrangler.toml
# =============================================================

name = "uptime-monitor"
main = "src/index.js"
compatibility_date = "2025-01-01"

# ── D1 資料庫綁定 ──
[[d1_databases]]
binding = "DB"
database_name = "uptime-monitor-db"
database_id = "d0ded441-7b10-4b82-a63b-0e764d39d0c5"

# ── 環境變數 ──
[vars]
ALERT_COOLDOWN_MINUTES = "30"
DATA_RETENTION_DAYS = "7"
LONG_DOWN_HOURS = "8"
ALERT_CHANNELS = "line"

# ── Cron 排程 ──
[triggers]
crons = ["*/5 * * * *", "0 19 * * *"]

# ── 觀測系統 (Logs) ──
[observability]
enabled = true

# ── 備註 ──
# TELEGRAM_BOT_TOKEN 等敏感資訊應透過 Dashbord Secret 設定，不可寫入此處。
